<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY BANK | by levi </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --accent: #ff007b; --admin-gold: #ffcc00; --bg: #02050a; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }
        
        .screen { display: none; padding: 20px; animation: slideUp 0.5s ease; }
        .active { display: block; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* البطاقة البنكية الفاخرة */
        .credit-card {
            width: 100%; max-width: 350px; height: 200px; margin: 0 auto 30px;
            background: linear-gradient(135deg, #0d1a26 0%, #000 100%);
            border-radius: 20px; padding: 25px; border: 1px solid rgba(0,242,255,0.3);
            position: relative; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .credit-card::before { content: ""; position: absolute; top: -50%; right: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,242,255,0.05) 0%, transparent 70%); }
        .card-chip { width: 45px; height: 35px; background: #e0ac1c; border-radius: 5px; margin-bottom: 20px; }

        /* المدخلات والأزرار */
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--primary); border-radius: 12px; color: #fff; text-align: center; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; display: block; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        .btn-admin { background: var(--admin-gold); color: #000; }

        /* لوحة التحكم */
        .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 700px) { .grid-layout { grid-template-columns: 1fr; } }
        .section-box { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen active">
        <div style="max-width:400px; margin: 50px auto; text-align:center;">
            <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:2.5rem;">INF-BANK</h1>
            <p style="opacity:0.6; margin-bottom:30px;">نظام الائتمان الرقمي الموحد</p>
            
            <div id="login-box" class="section-box">
                <input type="text" id="user_in" placeholder="اسم المستخدم">
                <input type="password" id="pass_in" placeholder="الرمز السري">
                <button class="btn btn-primary" onclick="handleLogin()">دخول 🔓</button>
                <p style="margin-top:15px; font-size:0.8rem">ليس لديك حساب؟ <a href="#" onclick="toggleAuth()" style="color:var(--primary)">سجل الآن</a></p>
            </div>

            <div id="signup-box" class="section-box" style="display:none">
                <input type="text" id="new_user" placeholder="اختر لقب (User)">
                <input type="password" id="new_pass" placeholder="اختر رمز (PIN)">
                <button class="btn btn-primary" onclick="handleSignup()">إنشاء حساب جديد ✨</button>
                <p style="margin-top:15px; font-size:0.8rem">لديك حساب؟ <a href="#" onclick="toggleAuth()" style="color:var(--primary)">دخول</a></p>
            </div>
        </div>
    </div>

    <div id="user-screen" class="screen">
        <div style="max-width:800px; margin:0 auto;">
            <div class="credit-card">
                <div class="card-chip"></div>
                <div style="font-family:'Orbitron'; font-size:1.2rem; letter-spacing:4px;" id="card_num">**** **** **** 0000</div>
                <div style="display:flex; justify-content:space-between; margin-top:30px;">
                    <div><small style="opacity:0.5">HOLDER</small><br><b id="holder_name">NAME</b></div>
                    <div><small style="opacity:0.5">RANK</small><br><b id="holder_rank" style="color:var(--primary)">MEMBER</b></div>
                </div>
            </div>

            <div class="section-box" style="text-align:center; margin-bottom:20px;">
                <p>رصيدك المتوفر</p>
                <h1 style="font-family:'Orbitron'; color:var(--primary); font-size:3rem;"><span id="user_bal">0</span> <small style="font-size:1rem">INF</small></h1>
            </div>

            <div class="grid-layout">
                <div class="section-box">
                    <h4>إرسال رصيد 💸</h4>
                    <input type="text" id="send_to" placeholder="اسم المستلم">
                    <input type="number" id="send_val" placeholder="المبلغ">
                    <button class="btn btn-primary" onclick="sendReq()">إرسال طلب تحويل</button>
                </div>
                <div class="section-box">
                    <h4>المتجر السريع 🛒</h4>
                    <button class="btn" style="background:var(--glass)" onclick="buyReq('رتبة فارس')">فارس (9,500 INF)</button>
                    <button class="btn" style="background:var(--glass)" onclick="buyReq('إعفاء عقوبة')">إعفاء (15,000 INF)</button>
                </div>
            </div>
            
            <button id="admin-access" class="btn btn-admin" style="display:none; margin-top:20px;" onclick="showAdmin()">لوحة الإدارة المركزية 👑</button>
        </div>
    </div>

    <div id="admin-screen" class="screen">
        <div style="max-width:1000px; margin:0 auto;">
            <button class="btn" style="background:#333; width:auto;" onclick="showUser()">🔙 العودة للحساب</button>
            <h2 style="margin:20px 0; color:var(--admin-gold)">التحكم الإمبراطوري</h2>
            
            <div class="section-box">
                <h4>إدارة المستخدمين</h4>
                <table id="admin-table">
                    <thead><tr><th>الاسم</th><th>الرصيد</th><th>الرتبة</th><th>إجراء</th></tr></thead>
                    <tbody id="db-body"></tbody>
                </table>
            </div>

            <div class="section-box" style="margin-top:20px;">
                <h4>تعديل يدوي سريع</h4>
                <div class="grid-layout">
                    <input type="text" id="target_u" placeholder="اسم العضو">
                    <input type="number" id="target_b" placeholder="المبلغ (+ أو -)">
                </div>
                <button class="btn btn-admin" onclick="adminUpdate()">تحديث البيانات فوراً</button>
            </div>
        </div>
    </div>

    <script>
        // قاعدة البيانات المحفوظة
        let db = JSON.parse(localStorage.getItem('inf_global_db')) || {
            "levi": { pin: "1001", bal: 5000000, rank: "الإمبراطور", isAdmin: true, cc: "8822" },
            "dororo": { pin: "300", bal: 100000, rank: "نائب الامبراطور", isAdmin: false, cc: "1199" }
        };

        let current = "";

        function save() { localStorage.setItem('inf_global_db', JSON.stringify(db)); }

        function toggleAuth() {
            document.getElementById('login-box').style.display = document.getElementById('login-box').style.display === 'none' ? 'block' : 'none';
            document.getElementById('signup-box').style.display = document.getElementById('signup-box').style.display === 'none' ? 'block' : 'none';
        }

        function handleSignup() {
            let u = document.getElementById('new_user').value.toLowerCase().trim();
            let p = document.getElementById('new_pass').value.trim();
            if(u && p) {
                if(db[u]) return alert("الاسم موجود مسبقاً!");
                db[u] = { pin: p, bal: 500, rank: "عضو جديد", isAdmin: false, cc: Math.floor(1000 + Math.random() * 9000) };
                save();
                alert("تم إنشاء حسابك بنجاح! رصيد ترحيبي 500 INF");
                toggleAuth();
            }
        }

        function handleLogin() {
            let u = document.getElementById('user_in').value.toLowerCase().trim();
            let p = document.getElementById('pass_in').value.trim();
            if(db[u] && db[u].pin === p) {
                current = u;
                showUser();
            } else { alert("بيانات خاطئة!"); }
        }

        function showUser() {
            hideAll();
            document.getElementById('user-screen').classList.add('active');
            document.getElementById('holder_name').innerText = current.toUpperCase();
            document.getElementById('holder_rank').innerText = db[current].rank;
            document.getElementById('user_bal').innerText = db[current].bal.toLocaleString();
            document.getElementById('card_num').innerText = "**** **** **** " + db[current].cc;
            if(db[current].isAdmin) document.getElementById('admin-access').style.display = "block";
        }

        function showAdmin() {
            hideAll();
            document.getElementById('admin-screen').classList.add('active');
            refreshAdmin();
        }

        function refreshAdmin() {
            let html = "";
            for(let u in db) {
                html += `<tr>
                    <td>${u}</td>
                    <td style="color:var(--primary)">${db[u].bal}</td>
                    <td>${db[u].rank}</td>
                    <td><button onclick="del('${u}')" style="background:red; border:none; color:white; padding:5px; border-radius:5px">حذف</button></td>
                </tr>`;
            }
            document.getElementById('db-body').innerHTML = html;
        }

        function adminUpdate() {
            let u = document.getElementById('target_u').value.toLowerCase();
            let b = parseInt(document.getElementById('target_b').value);
            if(db[u]) {
                db[u].bal += b;
                save(); refreshAdmin();
                alert("تم التحديث!");
            }
        }

        function sendReq() {
            let t = document.getElementById('send_to').value;
            let v = document.getElementById('send_val').value;
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent("طلب تحويل:\nمن: "+current+"\nإلى: "+t+"\nالمبلغ: "+v)}`);
        }

        function buyReq(n) {
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent("طلب شراء: "+n+"\nالعضو: "+current)}`);
        }

        function del(u) { if(confirm("حذف؟")) { delete db[u]; save(); refreshAdmin(); } }
        function hideAll() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); }
    </script>
</body>
</html>
