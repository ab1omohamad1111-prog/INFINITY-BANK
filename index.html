<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY | THE SINGULARITY V50</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@200;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff; --gold: #ffd700; --bg: #020205;
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { 
            background: var(--bg); color: #fff; height: 100vh; overflow: hidden;
            font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center;
        }

        /* محرك الإضاءة الخلفية */
        .aura-bg {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 242, 255, 0.15) 0%, transparent 50%);
            transition: 0.1s;
        }

        /* شاشة الدخول الاحترافية */
        #gate {
            background: rgba(0,0,0,0.8); padding: 80px; border-radius: 40px;
            backdrop-filter: blur(50px); border: 1px solid var(--border);
            text-align: center; width: 450px; box-shadow: 0 0 100px rgba(0,0,0,1);
            animation: zoomIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .neo-input {
            width: 100%; padding: 18px; margin: 10px 0; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 15px; color: #fff;
            text-align: center; font-size: 1.1rem; font-family: 'Orbitron'; outline: none; transition: 0.3s;
        }
        .neo-input:focus { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        .btn-prime {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--accent), #7000ff);
            color: white; font-weight: 900; font-family: 'Orbitron'; letter-spacing: 3px;
            cursor: pointer; transition: 0.4s;
        }
        .btn-prime:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }

        /* الواجهة الرئيسية (The HUD) */
        #app { display: none; width: 95%; max-width: 1400px; height: 85vh; gap: 30px; animation: fadeIn 1s; }
        .hud-layout { display: grid; grid-template-columns: 400px 1fr; gap: 30px; height: 100%; }

        /* البطاقة الكونية - تصميم "أبل" المستقبلي */
        .card-v50 {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.2));
            border: 1px solid var(--border); border-radius: 40px; padding: 40px;
            position: relative; overflow: hidden; backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .card-v50::before {
            content: ''; position: absolute; top: -20%; left: -20%; width: 50%; height: 50%;
            background: var(--accent); filter: blur(100px); opacity: 0.2;
        }

        .big-bal {
            font-family: 'Orbitron'; font-size: 4rem; font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        /* المتجر الهولوغرافي */
        .glass-panel {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 35px; padding: 30px; backdrop-filter: blur(15px);
        }

        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .item-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            padding: 20px; border-radius: 25px; text-align: center; transition: 0.3s;
        }
        .item-card:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); transform: translateY(-5px); }
        .item-card h4 { color: var(--gold); margin-bottom: 5px; }
        .item-card span { font-family: 'Orbitron'; color: var(--accent); font-size: 0.8rem; }

        /* الجداول السحابية */
        table { width: 100%; border-spacing: 0 10px; }
        td { background: rgba(255,255,255,0.03); padding: 15px; text-align: center; border-radius: 15px; font-weight: bold; }
        th { opacity: 0.4; font-size: 0.7rem; letter-spacing: 2px; }

        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="aura-bg" id="aura"></div>

    <div id="gate">
        <h1 style="font-family:'Orbitron'; font-size: 3rem; letter-spacing: 10px; color: var(--accent);">INFINITY</h1>
        <p style="font-size: 0.6rem; letter-spacing: 5px; opacity: 0.4; margin-bottom: 40px;">PRIVATE TERMINAL V50</p>
        <input type="text" id="u_id" class="neo-input" placeholder="OPERATOR ID">
        <input type="password" id="u_pin" class="neo-input" placeholder="PASSCODE">
        <button class="btn-prime" onclick="init()">ACCESS SYSTEM</button>
    </div>

    <div id="app">
        <div class="hud-layout">
            <div class="left">
                <div class="card-v50">
                    <div style="display:flex; justify-content:space-between;">
                        <div style="width:60px; height:40px; background:linear-gradient(45deg, var(--gold), #886600); border-radius:8px;"></div>
                        <h4 style="font-family:'Orbitron'; opacity:0.2;">INFINITE CORE</h4>
                    </div>
                    <div style="margin: 40px 0;">
                        <small style="opacity:0.4; letter-spacing:3px;">AVAILABLE ASSETS</small>
                        <div id="disp_bal" class="big-bal">0</div>
                    </div>
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div><small style="opacity:0.4;">OPERATOR</small><br><b id="disp_user" style="font-size:1.4rem;">---</b></div>
                        <div id="disp_rank" style="color:var(--accent); font-weight:900; letter-spacing:1px;">RANK</div>
                    </div>
                </div>

                <div class="glass-panel" style="margin-top:20px;">
                    <h3 style="margin-bottom:15px; color:var(--accent);">QUICK TRANSFER</h3>
                    <input type="text" id="t_to" class="neo-input" style="font-size:0.9rem" placeholder="المستلم">
                    <input type="number" id="t_amt" class="neo-input" style="font-size:0.9rem" placeholder="المبلغ">
                    <button class="btn-prime" onclick="sendReq()" style="padding:12px; font-size:0.8rem;">إرسال طاقة</button>
                </div>
            </div>

            <div class="right" style="overflow-y: auto;">
                <div class="glass-panel">
                    <h2 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:20px;">CENTRAL BAZAAR</h2>
                    <div class="shop-grid">
                        <div class="item-card" onclick="buy('فارس')"><h4>رتبة فارس</h4><span>9,500 INF</span></div>
                        <div class="item-card" onclick="buy('عفو')"><h4>عفو ملكي</h4><span>15,000 INF</span></div>
                        <div class="item-card" onclick="buy('لقب')"><h4>لقب ملكي</h4><span>50,000 INF</span></div>
                        <div class="item-card" onclick="buy('أدمن')"><h4>أدمن مؤقت</h4><span>100,000 INF</span></div>
                        <div class="item-card" onclick="buy('حماية')"><h4>درع طاقي</h4><span>25,000 INF</span></div>
                        <div class="item-card" onclick="buy('تغيير')"><h4>تغيير لقب</h4><span>5,000 INF</span></div>
                    </div>
                </div>

                <div id="admin_p" class="glass-panel" style="margin-top:20px; display:none; border-color:var(--gold);">
                    <h2 style="font-family:'Orbitron'; color:var(--gold);">ADMIN CONSOLE</h2>
                    <table>
                        <thead><tr><th>OPERATOR</th><th>BALANCE</th><th>RANK</th></tr></thead>
                        <tbody id="rows"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // تفاعل الماوس مع الإضاءة
        const aura = document.getElementById('aura');
        document.addEventListener('mousemove', (e) => {
            aura.style.setProperty('--x', e.clientX + 'px');
            aura.style.setProperty('--y', e.clientY + 'px');
        });

        // قاعدة البيانات
        let db = JSON.parse(localStorage.getItem('v50_db')) || {
            "levi": { pin: "1001", bal: 5000000, rank: "الإمبراطور", adm: true },
            "dororo": { pin: "300", bal: 100000, rank: "نائب الامبراطور", adm: false }
        };

        let currU = "";

        function init() {
            const u = document.getElementById('u_id').value.toLowerCase().trim();
            const p = document.getElementById('u_pin').value.trim();
            if(db[u] && db[u].pin === p) {
                currU = u;
                document.getElementById('gate').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                sync();
            } else { alert("ACCESS DENIED"); }
        }

        function sync() {
            const u = db[currU];
            document.getElementById('disp_bal').innerText = u.bal.toLocaleString();
            document.getElementById('disp_user').innerText = currU.toUpperCase();
            document.getElementById('disp_rank').innerText = u.rank;
            
            if(u.adm) {
                document.getElementById('admin_p').style.display = 'block';
                let h = "";
                for(let k in db) { h += `<tr><td>${k}</td><td style="color:var(--gold)">${db[k].bal.toLocaleString()}</td><td>${db[k].rank}</td></tr>`; }
                document.getElementById('rows').innerHTML = h;
            }
            localStorage.setItem('v50_db', JSON.stringify(db));
        }

        function buy(i) { window.open(`https://wa.me/212622201526?text=${encodeURIComponent(`[V50 SHOP] USER: ${currU} ITEM: ${i}`)}`); }
        function sendReq() {
            const t = document.getElementById('t_to').value;
            const a = document.getElementById('t_amt').value;
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent(`[V50 TRANS] TO: ${t} AMT: ${a}`)}`);
        }
    </script>
</body>
</html>
