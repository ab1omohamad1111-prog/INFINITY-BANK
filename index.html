<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY ERA | المركز الرئيسي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-page" class="overlay-wrapper">
        <div class="glass-box login-box">
            <div class="logo-glow">INFINITY</div>
            <h3>نظام التحقق من الهوية</h3>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="userpin" placeholder="الرمز السري (PIN)" maxlength="4">
            <button class="main-btn" onclick="login()">دخول القاعدة 🛡️</button>
        </div>
    </div>

    <div id="dashboard" class="dashboard-layout" style="display: none;">
        <aside class="sidebar">
            <div class="bank-card">
                <div class="card-top"><span>INFINITY</span></div>
                <div class="card-mid"><h2 id="display-name">---</h2><p id="display-rank">---</p></div>
                <div class="card-bottom"><h1 id="display-balance">0 INF</h1></div>
            </div>
            <nav class="side-nav">
                <button class="nav-item active" onclick="switchSection('home')">🏠 الرئيسية</button>
                <button class="nav-item" onclick="switchSection('store')">🛒 المتجر</button>
                <button class="nav-item logout" onclick="location.reload()">🚪 خروج</button>
            </nav>
        </aside>

        <main class="content-area">
            <section id="section-home" class="page-content">
                <div class="glass-box leaderboard">
                    <h3>🏆 لوحة الشرف (TOP 3)</h3>
                    <div id="top-members-list"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
