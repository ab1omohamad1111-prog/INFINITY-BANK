<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY SYSTEM | V3</title>
    <style>
        /* تصميم فخم متوافق مع جميع الهواتف */
        :root { --primary: #00f2ff; --epic: #ffd700; --rare: #9d00ff; }
        * { box-sizing: border-box; transition: 0.3s; }
        body { background: #020508; color: white; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        
        .page { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #001f21 0%, #020508 100%); }
        .box { background: rgba(10, 15, 20, 0.9); padding: 40px 25px; border-radius: 30px; border: 1px solid rgba(0, 242, 255, 0.3); width: 90%; max-width: 380px; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        h1 { color: var(--primary); text-shadow: 0 0 15px var(--primary); font-size: 2.5rem; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #1a2a35; background: #000; color: white; text-align: center; font-size: 1rem; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        
        .btn-main { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; color: #000; box-shadow: 0 0 20px var(--primary); font-size: 1.1rem; }
        
        #dash { display: none; padding: 20px; }
        .card { background: linear-gradient(135deg, #001f21, #000); border: 1px solid var(--primary); padding: 25px; border-radius: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #222; background: transparent; color: white; cursor: pointer; }
        .tabs button.active { background: var(--primary); color: #000; font-weight: bold; border: none; }
        
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item { background: #0a0f14; padding: 20px 10px; border-radius: 20px; border: 1px solid #1a2a35; text-align: center; position: relative; }
        .rarity { font-size: 0.6rem; position: absolute; top: 10px; right: 10px; padding: 2px 8px; border-radius: 5px; }
        
        .buy-btn { width: 100%; padding: 8px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-page" class="page">
        <div class="box">
            <h1>INFINITY</h1>
            <p style="opacity:0.5; font-size:0.8rem; margin-bottom:20px;">نظام الوصول المركزي</p>
            <input type="text" id="user_input" placeholder="اسم المستخدم">
            <input type="password" id="pin_input" placeholder="الرمز السري">
            <button class="btn-main" onclick="startLogin()">تأكيد الهوية 🛡️</button>
        </div>
    </div>

    <div id="dash">
        <div class="card">
            <h2 id="out_name">---</h2>
            <h1 style="font-size: 2.8rem;"><span style="font-size: 1rem; color: var(--primary);">INF</span> <span id="out_bal">0</span></h1>
            <p id="out_rank" style="background: rgba(0,242,255,0.1); display: inline-block; padding: 5px 15px; border-radius: 10px; border: 1px solid rgba(0,242,255,0.2);">---</p>
        </div>
        
        <div class="tabs">
            <button id="tab-h" class="active" onclick="changeView('h')">🏠 الرئيسية</button>
            <button id="tab-s" onclick="changeView('s')">🛒 المتجر</button>
        </div>

        <div id="v_h">
            <div style="background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; border: 1px solid #111;">
                <h3>مرحباً بك في القاعدة 🦅</h3>
                <p style="opacity: 0.7; line-height: 1.6;">تم تفعيل بروتوكول الحماية. يمكنك الآن تصفح المتجر وطلب الرتب والخدمات.</p>
            </div>
        </div>

        <div id="v_s" style="display:none">
            <div class="store-grid" id="store_box"></div>
        </div>
    </div>

    <script>
        // قاعدة البيانات (يمكنك إضافة أعضاء هنا بسهولة)
        var members = {
            "levi": { pin: "1001", bal: 50000, rank: "الإمبراطور" },
            "dororo": { pin: "2423", bal: 12500, rank: "المؤسس" },
            "fang": { pin: "8046", bal: 8500, rank: "المستشار" }
        };

        // قائمة المنتجات الجديدة
        var products = [
            { n: "رتبة فارس ⚔️", p: 9500, r: "rare", c: "#9d00ff" },
            { n: "أدمن (يومين) 🛡️", p: 65000, r: "epic", c: "#ffd700" },
            { n: "فترة راحة ✨", p: 65000, r: "epic", c: "#ffd700" },
            { n: "تغيير لون الرتبة 🎨", p: 12000, r: "rare", c: "#9d00ff" },
            { n: "صندوق الحظ 🎁", p: 3500, r: "common", c: "#00f2ff" },
            { n: "تصفير عقوبات 🧹", p: 15000, r: "common", c: "#00f2ff" }
        ];

        var activeUser = "";

        function startLogin() {
            var u = document.getElementById('user_input').value.toLowerCase().trim();
            var p = document.getElementById('pin_input').value.trim();

            if (members[u] && members[u].pin === p) {
                activeUser = u;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
                
                document.getElementById('out_name').innerText = u.toUpperCase();
                document.getElementById('out_bal').innerText = members[u].bal.toLocaleString();
                document.getElementById('out_rank').innerText = members[u].rank;
                
                renderStore();
            } else {
                alert("البيانات خاطئة! جرب levi و 1001");
            }
        }

        function changeView(v) {
            document.getElementById('v_h').style.display = (v === 'h') ? 'block' : 'none';
            document.getElementById('v_s').style.display = (v === 's') ? 'block' : 'none';
            document.getElementById('tab-h').className = (v === 'h') ? 'active' : '';
            document.getElementById('tab-s').className = (v === 's') ? 'active' : '';
        }

        function renderStore() {
            var html = "";
            for (var i = 0; i < products.length; i++) {
                var item = products[i];
                html += '<div class="item" style="border-color:' + item.c + '33">' +
                        '<span class="rarity" style="background:' + item.c + '; color:#000">' + item.r.toUpperCase() + '</span>' +
                        '<h4 style="margin: 10px 0;">' + item.n + '</h4>' +
                        '<p style="color:' + item.c + '; font-weight:bold;">' + item.p.toLocaleString() + ' INF</p>' +
                        '<button class="buy-btn" style="background:' + item.c + '; color:#000" onclick="buy(\'' + item.n + '\', ' + item.p + ')">طلب شراء</button>' +
                        '</div>';
            }
            document.getElementById('store_box').innerHTML = html;
        }

        function buy(name, price) {
            var data = members[activeUser];
            var msg = encodeURIComponent(
                "💠 طلب شراء جديد 💠\n\n" +
                "👤 المُرسل: " + activeUser.toUpperCase() + "\n" +
                "🎖 الرتبة: " + data.rank + "\n" +
                "🛒 المنتج: " + name + "\n" +
                "💰 السعر: " + price.toLocaleString() + " INF\n\n" +
                "⚠️ في انتظار الموافقة..."
            );
            window.open("https://wa.me/212622201526?text=" + msg);
        }
    </script>
</body>
</html>
