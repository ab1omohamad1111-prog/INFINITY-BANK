<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY | THE ORIGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+Arabic:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #05070a; --glass: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans Arabic', sans-serif; min-height: 100vh; overflow-y: auto; }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2); padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .input-cyber { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; text-align: center; }
        .btn-main { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: 900; cursor: pointer; color: #000; }

        /* الواجهة الرئيسية */
        #app { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        
        /* البطاقة الإمبراطورية (مثل الصورة تماماً) */
        .main-card {
            background: linear-gradient(135deg, #0a1018 0%, #02050a 100%);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(0, 242, 255, 0.3);
            text-align: center; position: relative; margin-bottom: 30px;
        }
        .bal-val { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--accent); margin: 15px 0; text-shadow: 0 0 20px rgba(0, 242, 255, 0.3); }
        .bal-val.nil { filter: blur(15px); }

        /* المتجر والخدمات */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .item-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; transition: 0.3s; cursor: pointer; }
        .item-card:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        /* لوحة الإدارة (شفافة وبسيطة) */
        .admin-zone { margin-top: 30px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .admin-table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        .admin-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-family:'Orbitron'; color:var(--accent); margin-bottom:20px;">INFINITY</h1>
            <input type="text" id="u_in" placeholder="المعرف" class="input-cyber">
            <input type="password" id="p_in" placeholder="كلمة السر" class="input-cyber">
            <button class="btn-main" onclick="login()">دخول</button>
        </div>
    </div>

    <div id="app">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="user_name">LEVI</h2>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer;">خروج</button>
        </div>

        <div class="main-card">
            <p style="opacity:0.5; letter-spacing:2px;">AVAILABLE ASSETS</p>
            <div id="balance" class="bal-val">14,950,000</div>
            <button onclick="toggleNil()" style="background:none; border:1px solid #333; color:#555; padding:5px 15px; border-radius:20px; cursor:pointer;">وضع التخفي (Nil)</button>
        </div>

        <h3 style="color:var(--accent); margin:20px 0;">المتجر المركزي 🛒</h3>
        <div class="grid-container">
            <div class="item-card" onclick="req('شراء رتبة فارس')"><h4>رتبة فارس</h4><p>5,000</p></div>
            <div class="item-card" onclick="req('شراء لقب ملكي')"><h4>لقب ملكي</h4><p>50,000</p></div>
            <div class="item-card" onclick="req('تغيير لون الحساب')"><h4>تغيير لون</h4><p>1,000</p></div>
            <div class="item-card" onclick="req('طلب تغيير كلمة السر أو اليوزر')" style="border-color: #ffcc00;">
                <h4 style="color: #ffcc00;">الأمان 🛡️</h4>
                <p style="font-size:0.7rem;">تغيير السر/اليوزر</p>
            </div>
        </div>

        <div id="admin-panel" class="admin-zone" style="display:none;">
            <h3 style="color:red;">سجل النقابة [إدارة]</h3>
            <table class="admin-table">
                <tr style="color:var(--accent); font-weight:bold;"><td>العضو</td><td>الرصيد</td><td>الرتبة</td></tr>
                <tr><td>Mohamed Amine</td><td>14.95M</td><td>Emperor</td></tr>
                <tr><td>Guest_01</td><td>50,000</td><td>Knight</td></tr>
            </table>
        </div>
    </div>

    <script>
        const myData = { user: "levi", pass: "1001", bal: 14950000 };

        function login() {
            let u = document.getElementById('u_in').value.toLowerCase();
            let p = document.getElementById('p_in').value;
            if(u === myData.user && p === myData.pass) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('user_name').innerText = u.toUpperCase();
            } else { alert("البيانات خاطئة!"); }
        }

        let isNil = false;
        function toggleNil() {
            isNil = !isNil;
            let b = document.getElementById('balance');
            b.innerText = isNil ? "Nil" : myData.bal.toLocaleString();
            isNil ? b.classList.add('nil') : b.classList.remove('nil');
        }

        function req(action) {
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent(`مرحباً، أنا ${myData.user.toUpperCase()}، أريد: ${action}`)}`);
        }
    </script>
</body>
</html>
