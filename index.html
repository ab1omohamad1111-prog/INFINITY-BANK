<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY ERA | المركز الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d2ff; --bg: #000; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; direction: rtl; height: 100vh; overflow: hidden; }

        /* شاشة الدخول */
        .overlay-wrapper { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #000; z-index: 1000; }
        .login-box { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 40px; text-align: center; width: 350px; box-shadow: 0 0 30px rgba(0,210,255,0.1); }
        .logo-glow { font-family: 'Orbitron'; font-size: 2.5rem; text-shadow: 0 0 15px var(--neon); color: var(--neon); margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; font-size: 1rem; }
        .main-btn { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 1.1rem; transition: 0.3s; }
        .main-btn:hover { background: #fff; box-shadow: 0 0 20px var(--neon); }

        /* لوحة التحكم */
        .dashboard-layout { display: none; width: 100%; height: 100%; }
        .sidebar { width: 350px; background: #050505; padding: 25px; border-left: 1px solid #111; display: flex; flex-direction: column; gap: 20px; }
        .bank-card { height: 200px; background: linear-gradient(135deg, #001f3f, #000); border: 1px solid var(--neon); border-radius: 20px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .content-area { flex: 1; padding: 40px; background: radial-gradient(circle at top right, #001f3f, #000); overflow-y: auto; }
        
        .leaderboard { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid #ffd700; margin-top: 20px; }
        .top-member { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .rank-1 { color: #ffd700; font-weight: bold; font-size: 1.2rem; }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .dashboard-layout { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .content-area { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول -->
    <div id="login-page" class="overlay-wrapper">
        <div class="login-box">
            <div class="logo-glow">INFINITY</div>
            <p>نظام التحقق من الهوية المركزية</p>
            <input type="text" id="username" placeholder="اسم المستخدم (مثال: levi)">
            <input type="password" id="userpin" placeholder="الرمز السري (PIN)" maxlength="4">
            <button class="main-btn" onclick="processLogin()">دخول القاعدة 🛡️</button>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboard" class="dashboard-layout">
        <aside class="sidebar">
            <div class="bank-card">
                <div>
                    <small style="color: var(--neon)">INFINITY BANK</small>
                    <h2 id="display-name" style="margin: 5px 0">USER</h2>
                    <p id="display-rank" style="font-size: 0.8rem; opacity: 0.7">RANK</p>
                </div>
                <h1 id="display-balance" style="color: #00ffcc; margin: 0;">0 INF</h1>
            </div>
            <button class="main-btn" style="background: transparent; color: #ff4444; border: 1px solid #ff4444;" onclick="location.reload()">تسجيل الخروج 🚪</button>
        </aside>

        <main class="content-area">
            <h2 style="font-family: Orbitron; border-bottom: 1px solid var(--neon); padding-bottom: 10px;">DASHBOARD</h2>
            <div class="leaderboard">
                <h3>🏆 لوحة الشرف (الأكثر ثراءً)</h3>
                <div id="top-members-list"></div>
            </div>
        </main>
    </div>

    <script>
        // قاعدة البيانات المركزية
        const members = {
            "levi": { pin: "1001", balance: 50000, rank: "الإمبراطور" },
            "dororo": { pin: "2423", balance: 12500, rank: "المؤسس" },
            "fang": { pin: "8046", balance: 8500, rank: "المستشار" }
        };

        function processLogin() {
            const user = document.getElementById("username").value.toLowerCase().trim();
            const pin = document.getElementById("userpin").value.trim();

            console.log("Attempting login for:", user); // للتشخيص

            if (members[user] && members[user].pin === pin) {
                // إخفاء صفحة الدخول وإظهار اللوحة
                document.getElementById("login-page").style.display = "none";
                document.getElementById("dashboard").style.display = "flex";
                
                // تحديث البيانات
                const data = members[user];
                document.getElementById("display-name").innerText = user.toUpperCase();
                document.getElementById("display-balance").innerText = data.balance.toLocaleString() + " INF";
                document.getElementById("display-rank").innerText = "الرتبة: " + data.rank;

                // تحديث لوحة الشرف
                updateLeaderboard();
            } else {
                alert("🛡️ عذراً! الهوية أو الرمز السري غير صحيح.");
            }
        }

        function updateLeaderboard() {
            const list = document.getElementById("top-members-list");
            list.innerHTML = "";
            
            const sorted = Object.keys(members)
                .map(name => ({ name, balance: members[name].balance }))
                .sort((a, b) => b.balance - a.balance)
                .slice(0, 3);

            sorted.forEach((m, i) => {
                list.innerHTML += `
                    <div class="top-member ${i === 0 ? 'rank-1' : ''}">
                        <span>#${i+1} ${m.name.toUpperCase()}</span>
                        <span>${m.balance.toLocaleString()} INF</span>
                    </div>`;
            });
        }
    </script>
</body>
</html>
