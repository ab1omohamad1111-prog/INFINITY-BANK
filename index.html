<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY | OMNI-OPERATOR V60</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+Arabic:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* نظام الألوان السيبراني المتقن */
            --bg: #010203; /* أسود عميق */
            --glass: rgba(10, 20, 30, 0.85); /* زجاج سيبراني */
            --border: rgba(0, 242, 255, 0.2); /* حدود نيون */
            --accent: #00f2ff; /* النيون الأزرق (للأرقام ورتبة الإمبراطور) */
            --gold: #ffd700; /* الذهبي الملكي (للألقاب والشريحة) */
            --admin: #a020f0; /* الأرجواني الملكي للوحة الإدارة */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden; font-family: 'Noto Sans Arabic', sans-serif; }
        
        /* تأثير الخلفية النجمية */
        .space-bg { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #0c182a 0%, #010203 100%); }

        /* الشاشات الرئيسية */
        .screen { display: none; padding: 30px; animation: slideUp 0.6s ease; }
        .screen.active { display: block; }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* بوابة الدخول الهولوغرافية */
        #login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: #000; z-index: 1000; }
        .hologram-box { background: rgba(0,0,0,0.9); padding: 60px; border-radius: 30px; border: 2px solid var(--accent); text-align: center; width: 400px; box-shadow: 0 0 50px rgba(0, 242, 255, 0.3); }
        .input-cyber { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 12px; color: #fff; text-align: center; font-family: 'Orbitron'; font-size: 1.1rem; }
        .input-cyber:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); }

        /* تخطيط اللوحة الرئيسية */
        #main-dashboard { grid-template-columns: 450px 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; display: grid; }
        @media (max-width: 900px) { #main-dashboard { grid-template-columns: 1fr; } }

        /* البطاقة الإمبراطورية V3 */
        .cosmic-card {
            background: linear-gradient(135deg, #0a1018 0%, #010203 100%);
            padding: 40px; border-radius: 40px; border: 1px solid var(--gold);
            position: relative; overflow: hidden; transform-style: preserve-3d; transition: 0.3s;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); margin-bottom: 25px;
        }
        .cosmic-card:hover { transform: perspective(1000px) rotateY(10deg) rotateX(5deg); }

        .chip { width: 70px; height: 45px; background: linear-gradient(45deg, #ffd700, #aa8800); border-radius: 10px; box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        
        .bal-display-container { position: relative; margin: 30px 0; }
        .bal-val { font-family: 'Orbitron'; font-size: 4.5rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 30px rgba(0, 242, 255, 0.5); }
        .bal-val.hidden { color: rgba(255, 255, 255, 0.1); filter: blur(25px); pointer-events: none; }
        .eye-toggle-abs { position: absolute; top: 0; left: -20px; background: none; border: none; color: var(--gold); cursor: pointer; font-size: 1.2rem; }

        /* المتجر الشبكي السداسي */
        .glass-box { background: var(--glass); padding: 30px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px; backdrop-filter: blur(20px); }
        
        .shop-hex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .shop-node { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .shop-node:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.03); transform: translateY(-5px); }
        .shop-node h4 { color: var(--gold); font-size: 1.2rem; }
        .shop-node small { font-family: 'Orbitron'; color: var(--accent); font-size: 0.8rem; letter-spacing: 1px; }

        /* لوحة الإدارة المستقلة (الأكثر أهمية) */
        .admin-zone { border: 2px solid var(--admin); border-radius: 35px; padding: 30px; background: rgba(160, 32, 240, 0.03); }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 20px; }
        th { color: var(--admin); font-family: 'Orbitron'; text-align: right; padding: 15px; font-size: 0.8rem; }
        td { background: rgba(255,255,255,0.02); padding: 20px; text-align: right; font-weight: bold; font-family: 'Orbitron'; color:var(--accent) }
        td:first-child { border-radius: 0 15px 15px 0; border-right: 3px solid var(--admin); }
        td:last-child { border-radius: 15px 0 0 15px; }

        .btn-core { width: 100%; padding: 15px; border-radius: 15px; border: none; background: linear-gradient(45deg, #00f2ff, #7000ff); color: white; font-weight: 900; font-family: 'Orbitron'; letter-spacing: 4px; cursor: pointer; transition: 0.4s; }
        .btn-core:hover { box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); transform: scale(1.02); }

    </style>
</head>
<body>

    <div class="space-bg"></div>

    <div id="login-screen" class="screen active">
        <div class="hologram-box">
            <h1 style="font-family:'Orbitron'; font-size: 3.5rem; letter-spacing: 15px; color: var(--accent);">INFINITY</h1>
            <p style="font-size: 0.7rem; opacity: 0.4; margin-bottom: 40px;">PRIVATE CORE V60</p>
            <input type="text" id="user_in" class="input-cyber" placeholder="OPERATOR IDENT">
            <input type="password" id="pass_in" class="input-cyber" placeholder="ENCRYPTED PIN">
            <button class="btn-core" onclick="auth()">INITIALIZE ACCESS</button>
        </div>
    </div>

    <div id="app" class="screen">
        <div id="main-dashboard">
            
            <div class="side-panel">
                <div class="cosmic-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div class="chip"></div>
                        <h4 style="font-family:'Orbitron'; color: rgba(255,255,255,0.1);">INFINITE CORE</h4>
                    </div>
                    
                    <div class="bal-display-container">
                        <small style="opacity:0.4; letter-spacing:2px;">AVAILABLE ASSETS</small>
                        <div id="disp_bal" class="bal-val">0</div>
                        <button class="eye-toggle-abs" onclick="toggleSecret()">👁️‍🗨️</button>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <small style="opacity:0.4;">OPERATOR</small><br>
                            <span id="disp_user" style="font-size:1.6rem; font-weight:900; letter-spacing:3px;">---</span>
                        </div>
                        <div id="disp_rank" style="color:var(--accent); font-weight:900; background: rgba(0, 242, 255, 0.1); padding: 5px 15px; border-radius: 50px;">RANK</div>
                    </div>
                </div>

                <div class="glass-box">
                    <h4>إرسال طاقة (تحويل) 💸</h4>
                    <input type="text" id="send_to" class="input-cyber" placeholder="اسم العضو المستقبل">
                    <input type="number" id="send_val" class="input-cyber" placeholder="المبلغ المراد إرساله">
                    <button class="btn-core" onclick="transfer()">إرسال طلب التحويل</button>
                </div>
            </div>

            <div class="main-content">
                <div class="glass-box">
                    <h2 style="font-family:'Orbitron'; color: var(--gold); margin-bottom: 20px;">CENTRAL BAZAAR</h2>
                    <div class="shop-hex-grid">
                        <div class="shop-node" onclick="buyReq('رتبة فارس')"><h4>رتبة فارس</h4><small>9,500 INF</small></div>
                        <div class="shop-node" onclick="buyReq('عفو ملكي')"><h4>عفو ملكي</h4><small>15,000 INF</small></div>
                        <div class="shop-node" onclick="buyReq('لقب ملكي')"><h4>لقب ملكي</h4><small>50,000 INF</small></div>
                        <div class="shop-node" onclick="buyReq('أدمن مؤقت')"><h4>أدمن مؤقت</h4><small>100,000 INF</small></div>
                        <div class="shop-node" onclick="buyReq('درع حماية')"><h4>درع حماية</h4><small>25,000 INF</small></div>
                        <div class="shop-node" onclick="buyReq('تغيير لقب')"><h4>تغيير لقب</h4><small>5,000 INF</small></div>
                    </div>
                </div>

                <div id="admin_zone" class="admin-zone" style="display:none;">
                    <h2 style="font-family:'Orbitron'; color: var(--admin);">CENTRAL ADMIN CONSOLE</h2>
                    <table>
                        <thead>
                            <tr><th>OPERATOR</th><th>BALANCE</th><th>RANK</th></tr>
                        </thead>
                        <tbody id="db-rows"></tbody>
                    </table>
                </div>

                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; width:100%; margin-top:20px;">TERMINATE SESSION</button>
            </div>

        </div>
    </div>

    <script>
        // قاعدة البيانات المركزية الحقيقية المتقنة
        const coreDB = JSON.parse(localStorage.getItem('inf_core_v60')) || {
            "levi": { pin: "1001", bal: 5000000, rank: "الإمبراطور", priv: true },
            "dororo": { pin: "300", bal: 100000, rank: "نائب الامبراطور", priv: false },
            "fang": { pin: "8046", bal: 8500, rank: "المستشار", priv: false },
            "shin": { pin: "2233", bal: 9999, rank: "فارس", priv: false }
        };

        let sessionUser = "";
        let secretMode = false; // لميزة إخفاء الرصيد

        function save() { localStorage.setItem('inf_core_v60', JSON.stringify(coreDB)); }

        function auth() {
            let u = document.getElementById('user_in').value.toLowerCase().trim();
            let p = document.getElementById('pass_in').value.trim();
            if(coreDB[u] && coreDB[u].pin === p) {
                sessionUser = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').classList.add('active');
                sync();
            } else { alert("CRITICAL: IDENTITY NOT RECOGNIZED"); }
        }

        function sync() {
            const user = coreDB[sessionUser];
            document.getElementById('disp_user').innerText = sessionUser.toUpperCase();
            document.getElementById('disp_rank').innerText = user.rank;
            
            // ميزة إخفاء وإظهار الرصيد كما في الصورة
            if(secretMode) {
                document.getElementById('disp_bal').innerText = "••••••••";
                document.getElementById('disp_bal').classList.add('hidden');
            } else {
                document.getElementById('disp_bal').innerText = user.bal.toLocaleString();
                document.getElementById('disp_bal').classList.remove('hidden');
            }
            
            // جلب لوحة الإدارة المركزية وعرض البيانات الحقيقية
            if(user.priv) {
                document.getElementById('admin_zone').style.display = 'block';
                let html = "";
                for(let key in coreDB) {
                    html += `<tr>
                        <td>${key}</td>
                        <td style="color:var(--gold);">${coreDB[key].bal.toLocaleString()}</td>
                        <td>${coreDB[key].rank}</td>
                    </tr>`;
                }
                document.getElementById('db-rows').innerHTML = html;
            }
            save();
        }

        function toggleSecret() { secretMode = !secretMode; sync(); }

        function transfer() {
            let to = document.getElementById('send_to').value;
            let val = document.getElementById('send_val').value;
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent(`🚀 طلـب تحويل طـارئ\nمن العضو: ${sessionUser}\nإلى العضو: ${to}\nالمبلغ: ${val} INF`)}`);
        }

        function buyReq(item) {
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent(`🛒 طلـب شـراء من المتجر الإمبراطوري\nالعضو: ${sessionUser}\nالمنتج: ${item}`)}`);
        }
    </script>
</body>
</html>
