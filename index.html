<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY PREMIER | SECURE ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff;
            --bg: #0a0c10;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; overflow: hidden; }

        /* شاشة تسجيل الدخول */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .login-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 50px; border-radius: 24px; backdrop-filter: blur(20px);
            width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card h1 { font-weight: 900; margin-bottom: 30px; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.3); color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .btn-login {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--primary); color: #000; font-weight: 900; cursor: pointer;
        }

        /* الواجهة الرئيسية */
        #main-app { display: none; padding: 40px; max-width: 1200px; margin: 0 auto; height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .dashboard { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }

        /* بطاقة الرصيد */
        .balance-card {
            background: linear-gradient(135deg, #1a1f26 0%, #0a0c10 100%);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .balance-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.05) 0%, transparent 70%);
        }
        .bal-title { font-size: 0.9rem; opacity: 0.5; margin-bottom: 10px; }
        .bal-val { font-size: 3.5rem; font-weight: 900; font-family: 'Inter'; color: var(--primary); }
        .bal-val.nil { filter: blur(15px); }

        /* أزرار التحكم */
        .control-panel { background: var(--card-bg); padding: 30px; border-radius: 30px; border: 1px solid var(--border); }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .menu-item {
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px;
            text-align: center; border: 1px solid var(--border); cursor: pointer; transition: 0.3s;
        }
        .menu-item:hover { background: rgba(0, 229, 255, 0.05); border-color: var(--primary); }

        /* جدول الأعضاء للأدمنز */
        .admin-section { margin-top: 30px; background: var(--card-bg); padding: 30px; border-radius: 30px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: right; opacity: 0.4; font-size: 0.8rem; padding-bottom: 15px; }
        td { padding: 15px 0; border-top: 1px solid var(--border); font-weight: 600; }

        .tag { padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; background: rgba(0,229,255,0.1); color: var(--primary); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>INFINITY</h1>
            <div class="input-group">
                <label>معرف المستخدم</label>
                <input type="text" id="username" placeholder="LEVI_01">
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-login" onclick="login()">دخول النظام</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div>
                <h2 id="welcome-msg">مرحباً، ليفي</h2>
                <p style="opacity:0.5; font-size:0.8rem;">آخر ظهور: اليوم، 9:15 مساءً</p>
            </div>
            <button onclick="location.reload()" style="background:none; border:1px solid red; color:red; padding:8px 20px; border-radius:10px; cursor:pointer;">خروج آمن</button>
        </div>

        <div class="dashboard">
            <div class="left-col">
                <div class="balance-card">
                    <p class="bal-title">إجمالي الرصيد المتاح</p>
                    <div id="balance" class="bal-val">14,950,000</div>
                    <div style="margin-top:20px; display:flex; gap:15px;">
                        <button onclick="toggleBlur()" style="background:none; border:1px solid rgba(255,255,255,0.2); color:#fff; padding:10px 20px; border-radius:12px; cursor:pointer;">إخفاء / إظهار</button>
                        <button onclick="transfer()" class="btn-login" style="width:auto;">تحويل سريع</button>
                    </div>
                </div>

                <div class="admin-section" id="admin-view" style="display:none;">
                    <h3>سجل أعضاء النقابة</h3>
                    <table>
                        <thead>
                            <tr><th>العضو</th><th>الرتبة</th><th>الرصيد</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>Mohamed Amine</td><td><span class="tag">MONARCH</span></td><td>14.95M</td></tr>
                            <tr><td>Ahmed_X</td><td><span class="tag">ADMIN</span></td><td>240,000</td></tr>
                            <tr><td>User_09</td><td><span>MEMBER</span></td><td>5,400</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="right-col">
                <div class="control-panel">
                    <h3>خدمات النظام</h3>
                    <div class="grid-menu">
                        <div class="menu-item" onclick="alert('قريباً')">📦 المتجر</div>
                        <div class="menu-item" onclick="alert('قريباً')">🏆 الرتب</div>
                        <div class="menu-item" onclick="alert('قريباً')">⚙️ الإعدادات</div>
                        <div class="menu-item" onclick="alert('قريباً')">🛡️ الأمان</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value.toLowerCase();
            const pass = document.getElementById('password').value;

            if(user === 'levi' && pass === '1001') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('admin-view').style.display = 'block';
            } else {
                alert("بيانات الدخول غير صحيحة");
            }
        }

        let blurred = false;
        function toggleBlur() {
            blurred = !blurred;
            const bal = document.getElementById('balance');
            if(blurred) {
                bal.innerText = "Nil";
                bal.classList.add('nil');
            } else {
                bal.innerText = "14,950,000";
                bal.classList.remove('nil');
            }
        }

        function transfer() {
            const target = prompt("أدخل اسم العضو المستلم:");
            const amount = prompt("أدخل المبلغ:");
            if(target && amount) {
                window.open(`https://wa.me/212622201526?text=طلب تحويل مبلغ ${amount} إلى ${target}`);
            }
        }
    </script>
</body>
</html>
