<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY | NOVARIS V21</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff; --accent: #7000ff; --gold: #ffd700;
            --bg: #010204; --card-bg: rgba(10, 10, 15, 0.9);
            --glow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; cursor: crosshair; }
        
        body {
            background: var(--bg); color: #fff; min-height: 100vh; overflow-x: hidden;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #0a1128 0%, #010204 100%);
        }

        /* تأثير الشبكة الكونية في الخلفية */
        .grid-bg {
            position: fixed; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px; transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite; z-index: -1;
        }
        @keyframes grid-move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        /* حاوية النظام */
        .novaris-container {
            width: 100%; max-width: 1200px; min-height: 80vh; margin: 20px;
            display: none; animation: fadeIn 1s ease-out;
        }

        /* شاشة الدخول (The Gate) */
        #gate-screen {
            text-align: center; background: var(--card-bg); padding: 60px;
            border-radius: 50px; border: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(20px); box-shadow: var(--glow); width: 450px;
        }

        .input-field {
            width: 100%; padding: 18px; margin: 15px 0; background: rgba(0,0,0,0.6);
            border: 1px solid #222; border-radius: 20px; color: #fff; text-align: center;
            font-size: 1.1rem; transition: 0.4s; border-right: 4px solid var(--primary);
        }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 25px rgba(0, 242, 255, 0.4); transform: scale(1.02); }

        .btn-action {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: #fff; font-weight: 900; font-family: 'Orbitron'; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-action:hover { filter: brightness(1.3); letter-spacing: 5px; transform: translateY(-3px); }

        /* لوحة التحكم (Dashboard) */
        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 30px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        /* البطاقة الكونية */
        .cosmic-card {
            background: linear-gradient(135deg, #050505 0%, #1a1a1a 100%);
            padding: 40px; border-radius: 40px; border: 1px solid var(--gold);
            position: relative; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .cosmic-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .bal-value {
            font-family: 'Orbitron'; font-size: 4rem; font-weight: 900;
            background: linear-gradient(var(--gold), #fff); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(255,215,0,0.4));
        }

        /* الأقسام */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 35px; padding: 30px; backdrop-filter: blur(10px); margin-bottom: 20px;
        }

        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .shop-btn {
            background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.1);
            padding: 20px; border-radius: 20px; color: #fff; cursor: pointer; text-align: center;
        }
        .shop-btn:hover { background: var(--primary); color: #000; font-weight: bold; }

        /* الجدول الإداري */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { color: var(--primary); font-family: 'Orbitron'; text-transform: uppercase; padding: 15px; }
        td { background: rgba(255,255,255,0.03); padding: 15px; text-align: center; }
        td:first-child { border-radius: 15px 0 0 15px; border-right: 3px solid var(--primary); }
        td:last-child { border-radius: 0 15px 15px 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div id="gate-screen">
        <h1 style="font-family:'Orbitron'; font-size: 3.5rem; letter-spacing: 10px; margin-bottom: 5px; color: var(--primary);">NOVARIS</h1>
        <p style="font-size: 0.8rem; letter-spacing: 5px; opacity: 0.5; margin-bottom: 40px;">PRIVATE BANKING CORE V21</p>
        
        <input type="text" id="access_id" class="input-field" placeholder="USER IDENTIFIER">
        <input type="password" id="access_pin" class="input-field" placeholder="SECURE PIN">
        
        <button class="btn-action" onclick="authenticate()">INITIALIZE ACCESS</button>
    </div>

    <div id="main-app" class="novaris-container">
        <div class="main-grid">
            
            <div class="identity-section">
                <div class="cosmic-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div style="width:60px; height:40px; background:linear-gradient(45deg, #ffd700, #b8860b); border-radius:8px;"></div>
                        <h4 style="font-family:'Orbitron'; color:var(--gold);">INFINITY</h4>
                    </div>
                    <div style="margin: 40px 0;">
                        <small style="opacity:0.5; letter-spacing:2px;">CREDIT BALANCE</small>
                        <div class="bal-value" id="val_bal">0</div>
                    </div>
                    <div style="display:flex; justify-content:space-between;">
                        <div><small style="opacity:0.4;">OPERATOR</small><br><b id="val_user" style="text-transform:uppercase; letter-spacing:2px;">---</b></div>
                        <div style="text-align:left;"><small style="opacity:0.4;">RANK</small><br><b id="val_rank" style="color:var(--primary);">---</b></div>
                    </div>
                </div>

                <div class="glass-panel" style="margin-top: 25px;">
                    <h3 style="margin-bottom:15px; color:var(--primary);">إجراءات التحويل 💳</h3>
                    <input type="text" id="send_to" class="input-field" style="font-size:0.9rem" placeholder="لقب المستلم">
                    <input type="number" id="send_amt" class="input-field" style="font-size:0.9rem" placeholder="المبلغ">
                    <button class="btn-action" onclick="reqTransfer()" style="padding:12px; font-size:0.8rem;">إرسال طلب التحويل</button>
                </div>
            </div>

            <div class="operations-section">
                <div id="admin-view" class="glass-panel" style="display:none; border-color:var(--gold);">
                    <h3 style="font-family:'Orbitron'; color:var(--gold); margin-bottom:20px;">COMMAND CENTER (ADMIN)</h3>
                    <table>
                        <thead>
                            <tr><th>IDENTIFIER</th><th>CREDITS</th><th>STATUS</th><th>OP</th></tr>
                        </thead>
                        <tbody id="admin_rows"></tbody>
                    </table>
                    <div style="display:flex; gap:10px; margin-top:20px;">
                        <input type="text" id="adm_u" class="input-field" style="margin:0" placeholder="Target User">
                        <input type="number" id="adm_v" class="input-field" style="margin:0" placeholder="Amount">
                        <button class="btn-action" onclick="admUpdate()" style="width:150px">UPDATE</button>
                    </div>
                </div>

                <div class="glass-panel">
                    <h3 style="margin-bottom:20px;">INFINITY SHOP | متجر النقابة</h3>
                    <div class="shop-grid">
                        <div class="shop-btn" onclick="reqShop('رتبة فارس')"><b>رتبة فارس</b><br><small>9,500 INF</small></div>
                        <div class="shop-btn" onclick="reqShop('إعفاء عقوبة')"><b>إعفاء عقوبة</b><br><small>15,000 INF</small></div>
                        <div class="shop-btn" onclick="reqShop('لقب ملكي')"><b>لقب ملكي</b><br><small>50,000 INF</small></div>
                        <div class="shop-btn" onclick="reqShop('أدمن مؤقت')"><b>أدمن (يوم)</b><br><small>100,000 INF</small></div>
                    </div>
                </div>
                
                <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer; font-weight:bold; letter-spacing:2px;">TERMINATE SESSION [LOGOUT]</button>
            </div>

        </div>
    </div>

    <script>
        // قاعدة البيانات الإمبراطورية (تُحفظ في المتصفح)
        let db = JSON.parse(localStorage.getItem('novaris_v21_db')) || {
            "levi": { pin: "1001", bal: 5000000, rank: "الإمبراطور", priv: true },
            "dororo": { pin: "300", bal: 100000, rank: "نائب الامبراطور", priv: false },
            "fong": { pin: "300", bal: 6000000000000, rank: "سونغ جينوو", priv: false },
            "fang": { pin: "8046", bal: 8500, rank: "المستشار", priv: false }
        };

        let currentSession = "";

        function save() { localStorage.setItem('novaris_v21_db', JSON.stringify(db)); }

        function authenticate() {
            const u = document.getElementById('access_id').value.toLowerCase().trim();
            const p = document.getElementById('access_pin').value.trim();
            
            if (db[u] && db[u].pin === p) {
                currentSession = u;
                document.getElementById('gate-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                syncUI();
            } else {
                alert("ACCESS DENIED: DNA/PIN MISMATCH");
            }
        }

        function syncUI() {
            const user = db[currentSession];
            document.getElementById('val_user').innerText = currentSession;
            document.getElementById('val_rank').innerText = user.rank;
            document.getElementById('val_bal').innerText = user.bal.toLocaleString();
            
            if (user.priv) {
                document.getElementById('admin-view').style.display = 'block';
                refreshAdmin();
            }
            save();
        }

        function refreshAdmin() {
            let html = "";
            for (let u in db) {
                html += `<tr>
                    <td>${u}</td>
                    <td style="color:var(--gold)">${db[u].bal.toLocaleString()}</td>
                    <td style="font-size:0.7rem">${db[u].rank}</td>
                    <td><button onclick="remUser('${u}')" style="color:red; background:none; border:none; cursor:pointer">X</button></td>
                </tr>`;
            }
            document.getElementById('admin_rows').innerHTML = html;
        }

        function admUpdate() {
            const u = document.getElementById('adm_u').value.toLowerCase();
            const v = parseInt(document.getElementById('adm_v').value);
            if (db[u] && !isNaN(v)) {
                db[u].bal += v;
                syncUI();
                alert("DATABASE RECORD MODIFIED");
            }
        }

        function reqTransfer() {
            const t = document.getElementById('send_to').value;
            const a = document.getElementById('send_amt').value;
            if(!t || !a) return alert("MISSING DATA");
            const msg = `⚡ *NOVARIS TRANSFER REQ*\nFROM: ${currentSession}\nTO: ${t}\nAMT: ${a} INF`;
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent(msg)}`);
        }

        function reqShop(item) {
            const msg = `🛒 *NOVARIS SHOP REQ*\nUSER: ${currentSession}\nITEM: ${item}`;
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent(msg)}`);
        }

        function remUser(u) { if(confirm("حذف العضو؟")) { delete db[u]; refreshAdmin(); save(); } }
    </script>
</body>
</html>
