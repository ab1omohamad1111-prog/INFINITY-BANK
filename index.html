<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY SYSTEM</title>
    <style>
        :root { --primary: #00f2ff; }
        body { background: #020508; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .page { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .box { background: #0a0f14; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 90%; max-width: 350px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #222; background: #000; color: white; text-align: center; }
        button { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #dash { display: none; padding: 20px; }
        .card { border: 1px solid var(--primary); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { background: #0a0f14; padding: 10px; border-radius: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="login-page" class="page">
        <div class="box">
            <h1 style="color:var(--primary)">INFINITY</h1>
            <input type="text" id="user_input" placeholder="اسم المستخدم">
            <input type="password" id="pin_input" placeholder="الرمز السري">
            <button type="button" onclick="startLogin()">تأكيد الهوية 🛡️</button>
        </div>
    </div>

    <div id="dash">
        <div class="card">
            <h2 id="out_name">---</h2>
            <h1><span style="font-size: 15px;">INF</span> <span id="out_bal">0</span></h1>
            <p id="out_rank">---</p>
        </div>
        
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button onclick="changeView('h')">الرئيسية</button>
            <button onclick="changeView('s')">المتجر</button>
        </div>

        <div id="v_h"><h2>مرحباً بك في القاعدة 🦅</h2></div>
        <div id="v_s" style="display:none">
            <div class="store-grid" id="store_box"></div>
        </div>
    </div>

    <script>
        // قاعدة البيانات
        var members = {
            "levi": { pin: "1001", bal: 50000, rank: "الإمبراطور" },
            "dororo": { pin: "2423", bal: 12500, rank: "المؤسس" },
            "fang": { pin: "8046", bal: 8500, rank: "المستشار" }
        };

        var products = [
            { n: "رتبة فارس ⚔️", p: 9500 },
            { n: "أدمن 🛡️", p: 65000 }
        ];

        var activeUser = "";

        // الدالة التي يتم استدعاؤها عند الضغط
        function startLogin() {
            var u = document.getElementById('user_input').value.toLowerCase().trim();
            var p = document.getElementById('pin_input').value.trim();

            if (members[u] && members[u].pin === p) {
                activeUser = u;
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dash').style.display = 'block';
                
                document.getElementById('out_name').innerText = u.toUpperCase();
                document.getElementById('out_bal').innerText = members[u].bal.toLocaleString();
                document.getElementById('out_rank').innerText = members[u].rank;
                
                renderStore();
            } else {
                alert("البيانات خاطئة! جرب levi و 1001");
            }
        }

        function changeView(v) {
            document.getElementById('v_h').style.display = (v === 'h') ? 'block' : 'none';
            document.getElementById('v_s').style.display = (v === 's') ? 'block' : 'none';
        }

        function renderStore() {
            var html = "";
            for (var i = 0; i < products.length; i++) {
                html += '<div class="item">' +
                        '<h4>' + products[i].n + '</h4>' +
                        '<p>' + products[i].p + '</p>' +
                        '<button onclick="buy(\'' + products[i].n + '\')">طلب</button>' +
                        '</div>';
            }
            document.getElementById('store_box').innerHTML = html;
        }

        function buy(name) {
            var msg = encodeURIComponent("طلب شراء: " + name + "\nمن: " + activeUser);
            window.open("https://wa.me/212622201526?text=" + msg);
        }
    </script>
</body>
</html>
