<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INFINITY ERA | المركز الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* كل التصميم مدمج هنا لضمان السرعة */
        :root { --neon: #00d2ff; --bg: #000; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; direction: rtl; height: 100vh; overflow: hidden; }
        
        /* شاشة الدخول */
        .login-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; width: 90%; max-width: 340px; text-align: center; box-shadow: 0 0 40px rgba(0,210,255,0.2); }
        .logo { font-family: 'Orbitron'; font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 5px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; text-align: center; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--neon); }
        .enter-btn { background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1.1rem; }

        /* الواجهة الداخلية */
        .app-container { display: none; height: 100vh; flex-direction: column; }
        .header { padding: 25px 20px; background: linear-gradient(to bottom, #001f3f, #000); border-bottom: 1px solid var(--neon); text-align: center; }
        .balance { font-size: 2.2rem; color: #00ffcc; font-family: 'Orbitron'; margin: 5px 0; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; background: radial-gradient(circle at center, #001f3f 0%, #000 100%); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease; }

        /* المتجر */
        .store-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .item-card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 20px; text-align: center; }
        .item-card h3 { font-size: 0.85rem; margin: 5px 0; color: #eee; }
        .price-tag { color: var(--neon); font-family: 'Orbitron'; font-size: 0.9rem; display: block; margin-bottom: 10px; }

        /* المنيو السفلي */
        .nav-bar { position: fixed; bottom: 25px; left: 20px; right: 20px; background: rgba(10,10,10,0.9); backdrop-filter: blur(15px); border: 1px solid #333; border-radius: 20px; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-btn { background: none; border: none; color: #555; font-family: 'Cairo'; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .nav-btn.active { color: var(--neon); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loginPage" class="login-screen">
        <div class="login-card">
            <div class="logo">INFINITY</div>
            <p style="opacity: 0.6; font-size: 0.8rem; margin-bottom: 20px;">نظام الإدارة - إصدار 2026</p>
            <input type="text" id="username" placeholder="اسم المستخدم">
            <input type="password" id="pin" placeholder="الرمز السري">
            <button class="enter-btn" onclick="checkLogin()">دخول 🛡️</button>
        </div>
    </div>

    <div id="mainApp" class="app-container">
        <header class="header">
            <div id="userRank" style="font-size: 0.75rem; color: var(--neon); text-transform: uppercase;">RANK</div>
            <div id="userBalance" class="balance">0 INF</div>
            <div id="userName" style="font-weight: bold; letter-spacing: 1px;">USER</div>
        </header>

        <main class="content">
            <div id="homeTab" class="tab-content active">
                <div style="background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid rgba(0,210,255,0.1);">
                    <h3 style="margin-top:0">لوحة التحكم</h3>
                    <p style="font-size: 0.9rem; line-height: 1.6; opacity: 0.8;">
                        مرحباً بك في مركز العمليات. هنا يمكنك متابعة رصيدك من عملة INF وشراء الرتب والمميزات.
                    </p>
                    <div style="color: #00ffcc; font-size: 0.8rem;">الحالة: متصل بالخادم الآمن 🟢</div>
                </div>
            </div>

            <div id="storeTab" class="tab-content">
                <h3 style="font-family: 'Orbitron'; color: var(--neon); margin-bottom: 15px;">ROYAL STORE</h3>
                <div class="store-grid">
                    <div class="item-card">
                        <h3>رتبة قائد ⚔️</h3>
                        <span class="price-tag">10,000 INF</span>
                        <button class="enter-btn" style="padding: 7px; font-size: 0.75rem;" onclick="sendOrder('رتبة قائد')">شراء</button>
                    </div>
                    <div class="item-card">
                        <h3>بطاقة عفو 🎫</h3>
                        <span class="price-tag">5,000 INF</span>
                        <button class="enter-btn" style="padding: 7px; font-size: 0.75rem;" onclick="sendOrder('بطاقة عفو')">شراء</button>
                    </div>
                    <div class="item-card">
                        <h3>تغيير اسم 👤</h3>
                        <span class="price-tag">2,500 INF</span>
                        <button class="enter-btn" style="padding: 7px; font-size: 0.75rem;" onclick="sendOrder('تغيير اسم')">شراء</button>
                    </div>
                    <div class="item-card">
                        <h3>فك حظر 🔓</h3>
                        <span class="price-tag">7,000 INF</span>
                        <button class="enter-btn" style="padding: 7px; font-size: 0.75rem;" onclick="sendOrder('فك حظر')">شراء</button>
                    </div>
                </div>
            </div>
        </main>

        <nav class="nav-bar">
            <button class="nav-btn active" id="btnHome" onclick="switchTab('home')">🏠 الرئيسية</button>
            <button class="nav-btn" id="btnStore" onclick="switchTab('store')">🛒 المتجر</button>
            <button class="nav-btn" onclick="location.reload()" style="color: #ff4444;">🚪 خروج</button>
        </nav>
    </div>

    <script>
        // إدارة الأعضاء والبيانات (هنا تعدل الفلوس والرتب)
        const membersData = {
            "levi":  { pin: "1001", bal: 50000, rank: "الإمبراطور" },
            "amine": { pin: "2026", bal: 15000, rank: "المستشار" },
            "dororo": { pin: "2423", bal: 12500, rank: "المؤسس" },
            "fang": { pin: "8046", bal: 8000, rank: "نخبة" }
        };

        let currentLoggedUser = "";

        function checkLogin() {
            const u = document.getElementById("username").value.toLowerCase().trim();
            const p = document.getElementById("pin").value.trim();

            if (membersData[u] && membersData[u].pin === p) {
                currentLoggedUser = u;
                document.getElementById("loginPage").style.display = "none";
                document.getElementById("mainApp").style.display = "flex";
                
                // تعبئة البيانات
                document.getElementById("userName").innerText = u.toUpperCase();
                document.getElementById("userBalance").innerText = membersData[u].bal.toLocaleString() + " INF";
                document.getElementById("userRank").innerText = membersData[u].rank;
            } else {
                alert("بيانات الدخول غير صحيحة يا مستشار!");
            }
        }

        function switchTab(t) {
            // إخفاء الكل
            document.getElementById('homeTab').classList.remove('active');
            document.getElementById('storeTab').classList.remove('active');
            document.getElementById('btnHome').classList.remove('active');
            document.getElementById('btnStore').classList.remove('active');

            // إظهار المختار
            if(t === 'home') {
                document.getElementById('homeTab').classList.add('active');
                document.getElementById('btnHome').classList.add('active');
            } else {
                document.getElementById('storeTab').classList.add('active');
                document.getElementById('btnStore').classList.add('active');
            }
        }

        function sendOrder(item) {
            const phone = "212622201526";
            const text = `طلب شراء من INFINITY ERA%0A👤 العضو: ${currentLoggedUser}%0A🎁 الغرض: ${item}`;
            window.open(`https://wa.me/${phone}?text=${text}`);
        }
    </script>
</body>
</html>
