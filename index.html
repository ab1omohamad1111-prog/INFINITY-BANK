<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="login-screen" class="full-page">
        <div class="glass-box login-card">
            <h1 class="neon-title">INFINITY</h1>
            <p class="subtitle">نظام الإدارة المركزي</p>
            <div class="inputs">
                <input type="text" id="user" placeholder="اسم المستخدم">
                <input type="password" id="pin" placeholder="الرمز السري">
            </div>
            <button class="main-btn" onclick="handleLogin()">دخول 🛡️</button>
        </div>
    </div>

    <div id="dashboard" class="full-page" style="display: none;">
        <div class="layout">
            <aside class="sidebar">
                <div class="bank-card">
                    <small>BANK OF INFINITY</small>
                    <h2 id="acc-name">USER</h2>
                    <div class="balance-box">
                        <span class="currency">INF</span>
                        <h1 id="acc-balance">0</h1>
                    </div>
                    <p id="acc-rank" class="rank-tag">RANK</p>
                </div>
                <nav class="nav-menu">
                    <button id="btn-home" class="nav-link active" onclick="showTab('home')">🏠 الرئيسية</button>
                    <button id="btn-store" class="nav-link" onclick="showTab('store')">🛒 المتجر</button>
                    <button class="nav-link exit" onclick="location.reload()">🚪 خروج</button>
                </nav>
            </aside>
            <main class="content">
                <div id="tab-home" class="tab-content">
                    <div class="hero">
                        <h2>أهلاً بك في القاعدة 🦅</h2>
                        <p>سوف يتم اضافة ميزات جديدة قريبًا.بقيادة السيد ليفاي ’ ترقبوا</p>
                    </div>
                </div>
                <div id="tab-store" class="tab-content" style="display: none;">
                    <div class="grid" id="store-items"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
