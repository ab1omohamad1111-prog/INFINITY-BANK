<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY | ULTIMATE TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #05070a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; min-height: 100vh; overflow-y: auto; }

        /* شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; border-radius: 20px; width: 350px; text-align: center; backdrop-filter: blur(10px); }
        .btn-action { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 15px; }

        /* الهيكل الرئيسي */
        #main-app { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }

        /* بطاقة الرصيد الفخمة */
        .balance-section { 
            background: linear-gradient(135deg, #0a1018 0%, #02050a 100%); 
            padding: 40px; border-radius: 25px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 0 30px rgba(0, 242, 255, 0.05);
        }
        .bal-val { font-family: 'Orbitron'; font-size: 3.5rem; color: var(--primary); margin: 15px 0; }
        .bal-val.nil { filter: blur(15px); }

        /* المتجر الجديد */
        .section-title { margin: 25px 0 15px; font-weight: 900; color: var(--primary); border-right: 4px solid var(--primary); padding-right: 15px; }
        .store-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .store-item { background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 15px; text-align: center; transition: 0.3s; }
        .store-item:hover { transform: translateY(-5px); border-color: var(--primary); background: rgba(0, 242, 255, 0.05); }

        /* لوحة تحكم الأدمن (سلطة ليفي) */
        .admin-panel { background: rgba(255, 0, 0, 0.02); border: 1px solid rgba(255, 0, 0, 0.2); padding: 25px; border-radius: 20px; margin-top: 30px; }
        .cmd-input { width: 100%; background: #000; border: 1px solid #333; padding: 12px; color: #00ff00; font-family: monospace; border-radius: 5px; margin-top: 10px; outline: none; }

        /* الإعدادات والأمان */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-field { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 5px; }

        .footer-note { text-align: center; opacity: 0.3; font-size: 0.7rem; margin: 40px 0; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1 style="font-family:'Orbitron'; color:var(--primary)">INFINITY</h1>
            <input type="text" id="user_in" placeholder="المعرف" class="input-field" style="margin-top:20px">
            <input type="password" id="pass_in" placeholder="كلمة السر" class="input-field">
            <button class="btn-action" onclick="auth()">دخول</button>
        </div>
    </div>

    <div id="main-app">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2>مرحباً، <span id="display_name" style="color:var(--primary)">Levi</span></h2>
            <button onclick="location.reload()" style="background:none; border:none; color:red; cursor:pointer">خروج آمن</button>
        </div>

        <div class="grid-container">
            <div class="balance-section">
                <p style="opacity:0.5">الرصيد الإجمالي</p>
                <div id="main_bal" class="bal-val">14,950,000</div>
                <button onclick="toggleNil()" style="background:none; border:1px solid #333; color:#aaa; padding:5px 15px; border-radius:20px; cursor:pointer">وضع التخفي (Nil)</button>
            </div>

            <h3 class="section-title">متجر النقابة 📦</h3>
            <div class="store-grid">
                <div class="store-item"><h4>رتبة فارس</h4><p>5,000</p><button class="btn-action" onclick="buy('رتبة فارس')">شراء</button></div>
                <div class="store-item"><h4>لقب ملكي</h4><p>50,000</p><button class="btn-action" onclick="buy('لقب ملكي')">شراء</button></div>
                <div class="store-item"><h4>تغيير لون</h4><p>1,000</p><button class="btn-action" onclick="buy('تغيير لون')">شراء</button></div>
            </div>

            <h3 class="section-title">إعدادات الحساب والأمان 🛡️</h3>
            <div class="settings-grid">
                <div class="store-item" style="text-align:right">
                    <label>تغيير اليوزر</label>
                    <input type="text" id="new_user" class="input-field" placeholder="اليوزر الجديد">
                    <button class="btn-action" onclick="updateUser()">حفظ التعديل</button>
                </div>
                <div class="store-item" style="text-align:right">
                    <label>تغيير كلمة السر</label>
                    <input type="password" id="new_pass" class="input-field" placeholder="السر الجديد">
                    <button class="btn-action" onclick="updatePass()">تحديث السر</button>
                </div>
            </div>

            <div id="admin_console" class="admin-panel" style="display:none">
                <h3 style="color:red">COMMAND TERMINAL [ADMIN] ⚠️</h3>
                <p style="font-size:0.8rem; opacity:0.6">أوامر سريعة: add [amount] | sub [amount] | set [rank]</p>
                <input type="text" id="cmd_line" class="cmd-input" placeholder="أدخل الأمر هنا..." onkeypress="execCmd(event)">
            </div>
        </div>

        <p class="footer-note">INFINITY PREMIER v3.0 | SECURE ENCRYPTED SESSION</p>
    </div>

    <script>
        let userData = {
            user: "levi",
            pass: "1001",
            bal: 14950000,
            isAdmin: true
        };

        function auth() {
            let u = document.getElementById('user_in').value.toLowerCase();
            let p = document.getElementById('pass_in').value;
            if(u === userData.user && p === userData.pass) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                if(userData.isAdmin) document.getElementById('admin_console').style.display = 'block';
                sync();
            } else { alert("خطأ في البيانات!"); }
        }

        function sync() {
            document.getElementById('main_bal').innerText = userData.bal.toLocaleString();
            document.getElementById('display_name').innerText = userData.user.toUpperCase();
        }

        let isNil = false;
        function toggleNil() {
            isNil = !isNil;
            let b = document.getElementById('main_bal');
            if(isNil) { b.innerText = "Nil"; b.classList.add('nil'); }
            else { b.innerText = userData.bal.toLocaleString(); b.classList.remove('nil'); }
        }

        function updateUser() {
            let n = document.getElementById('new_user').value;
            if(n) { userData.user = n; alert("تم تغيير اليوزر إلى: " + n); sync(); }
        }

        function updatePass() {
            let p = document.getElementById('new_pass').value;
            if(p) { userData.pass = p; alert("تم تحديث كلمة السر بنجاح"); }
        }

        // أوامر الأدمن (التحكم الكامل)
        function execCmd(e) {
            if(e.key === 'Enter') {
                let cmd = document.getElementById('cmd_line').value.split(' ');
                let action = cmd[0];
                let val = parseInt(cmd[1]);

                if(action === 'add') { userData.bal += val; alert("تم إضافة: " + val); }
                else if(action === 'sub') { userData.bal -= val; alert("تم خصم: " + val); }
                else { alert("أمر غير معروف!"); }
                
                sync();
                document.getElementById('cmd_line').value = "";
            }
        }

        function buy(item) {
            window.open(`https://wa.me/212622201526?text=أرغب في شراء ${item} لحسابي ${userData.user}`);
        }
    </script>
</body>
</html>
