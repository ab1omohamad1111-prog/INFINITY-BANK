<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBULA-X | THE ABSOLUTE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root {
            --neon: #00f2ff; --gold: #ffd700; --royal: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body { 
            background: #000; color: #fff; height: 100vh; overflow: hidden;
            font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center;
        }

        /* محرك الجزيئات في الخلفية */
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; }

        /* المؤشر المخصص (Custom Cursor) */
        #cursor {
            width: 20px; height: 20px; border: 2px solid var(--neon); border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999; transition: 0.1s;
            box-shadow: 0 0 15px var(--neon);
        }

        /* حاوية النظام الفضائي */
        .system-core {
            position: relative; z-index: 10; width: 90%; max-width: 1200px; height: 85vh;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 100px rgba(0, 242, 255, 0.1);
        }

        /* شاشة تسجيل الدخول الهولوغرافية */
        #login-overlay {
            position: absolute; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .hologram-input {
            background: transparent; border: none; border-bottom: 2px solid var(--neon);
            color: var(--neon); font-size: 1.5rem; text-align: center; margin: 20px;
            width: 300px; font-family: 'Orbitron'; outline: none; transition: 0.5s;
        }
        .hologram-input:focus { border-bottom: 2px solid var(--gold); letter-spacing: 5px; }

        /* البطاقة الأسطورية (The Artifact) */
        .artifact-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.5) 100%);
            padding: 50px; border-radius: 50px; border: 1px solid var(--gold);
            position: relative; overflow: hidden; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .artifact-card:hover { transform: scale(1.02) rotateY(10deg); border-color: var(--neon); }

        .balance-glow {
            font-family: 'Orbitron'; font-size: 5rem; font-weight: 900;
            background: linear-gradient(to right, #fff, var(--gold), var(--neon));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
        }

        /* ميزة الإخفاء السينمائي */
        .blur-mode { filter: blur(25px); pointer-events: none; transition: 0.5s; }

        /* الأزرار البلورية */
        .crystal-btn {
            padding: 15px 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            background: var(--glass); color: #fff; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.4s; position: relative; overflow: hidden;
        }
        .crystal-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg); transition: 0.5s;
        }
        .crystal-btn:hover::before { left: 100%; }
        .crystal-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

        /* الجدول الإمبراطوري */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th { color: var(--neon); text-transform: uppercase; font-family: 'Orbitron'; padding: 15px; border-bottom: 1px solid rgba(0, 242, 255, 0.2); }
        .data-table td { padding: 15px; text-align: center; background: rgba(255,255,255,0.01); border-bottom: 1px solid rgba(255,255,255,0.05); }

        @keyframes scan { 0% { top: -100%; } 100% { top: 100%; } }
        .scanner-line {
            position: absolute; width: 100%; height: 2px; background: var(--neon);
            box-shadow: 0 0 15px var(--neon); z-index: 50; animation: scan 3s linear infinite;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="particles-js"></div>

    <div class="system-core">
        <div class="scanner-line"></div>

        <!-- شاشة الدخول -->
        <div id="login-overlay">
            <h1 style="font-family:'Orbitron'; font-size: 4rem; letter-spacing: 15px; color: var(--neon); text-shadow: 0 0 20px var(--neon);">INFINITY</h1>
            <p style="opacity: 0.5; letter-spacing: 10px;">NEBULA-X INTERFACE</p>
            <input type="text" id="user_id" class="hologram-input" placeholder="IDENTIFIER">
            <input type="password" id="user_pin" class="hologram-input" placeholder="ENCRYPTED PIN">
            <button class="crystal-btn" onclick="initializeSystem()">INITIALIZE CORE</button>
        </div>

        <!-- واجهة المستخدم الرئيسية -->
        <div id="main-ui" style="display:none; padding: 40px; flex: 1; display: flex; flex-direction: column;">
            <div style="display: flex; gap: 40px; flex: 1;">
                
                <!-- الجانب الأيسر: البطاقة والتحكم -->
                <div style="flex: 1;">
                    <div class="artifact-card">
                        <div style="display:flex; justify-content:space-between; margin-bottom: 50px;">
                            <div style="width: 80px; height: 50px; background: linear-gradient(45deg, #ffd700, #aa8800); border-radius: 10px; box-shadow: 0 0 20px var(--gold);"></div>
                            <h2 style="font-family:'Orbitron'; opacity:0.3;">V.FINAL</h2>
                        </div>
                        <div style="position:relative;">
                            <small style="color:var(--neon); letter-spacing:3px;">UNIVERSAL ASSETS</small>
                            <div id="bal_display" class="balance-glow">0</div>
                            <button onclick="toggleGhostMode()" style="background:none; border:none; color:var(--gold); cursor:pointer; font-size:1.5rem;">👁️‍🗨️ GHOST MODE</button>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-top: 60px;">
                            <div><small style="opacity:0.4;">OPERATOR</small><br><b id="op_name" style="font-family:'Orbitron'; font-size:1.5rem;">---</b></div>
                            <div style="text-align:left;"><small style="opacity:0.4;">RANK</small><br><b id="op_rank" style="color:var(--neon); font-size:1.2rem;">---</b></div>
                        </div>
                    </div>

                    <div style="margin-top: 30px; background: var(--glass); padding: 30px; border-radius: 30px;">
                        <h3 style="margin-bottom:20px; color:var(--neon);">QUICK TRANSFER | تحويل طاقي</h3>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="t_to" class="hologram-input" style="width:100%; font-size:1rem; margin:0;" placeholder="المستلم">
                            <input type="number" id="t_amt" class="hologram-input" style="width:100%; font-size:1rem; margin:0;" placeholder="المبلغ">
                        </div>
                        <button class="crystal-btn" onclick="sendEnergy()" style="width:100%; margin-top:20px;">إرسال البيانات</button>
                    </div>
                </div>

                <!-- الجانب الأيمن: لوحة التحكم الإدارية -->
                <div style="flex: 1.2; display:none;" id="admin_zone">
                    <div style="background: rgba(112, 0, 255, 0.05); padding: 30px; border-radius: 40px; border: 1px solid var(--royal); height: 100%;">
                        <h2 style="font-family:'Orbitron'; color:var(--royal); margin-bottom:20px;">CENTRAL COMMAND</h2>
                        <table class="data-table">
                            <thead><tr><th>IDENTITY</th><th>CREDITS</th><th>RANK</th></tr></thead>
                            <tbody id="db_rows"></tbody>
                        </table>
                    </div>
                </div>

            </div>
            
            <button onclick="location.reload()" style="background:none; border:none; color:red; margin-top:20px; font-weight:bold;">DISCONNECT SESSION</button>
        </div>
    </div>

    <script>
        // محرك الجزيئات
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100 },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" } }
            }
        });

        // المؤشر المخصص
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // قاعدة البيانات
        let core = JSON.parse(localStorage.getItem('nebula_db')) || {
            "levi": { pin: "1001", bal: 9999999, rank: "الكيان الأعظم", admin: true },
            "dororo": { pin: "300", bal: 500000, rank: "نائب أول", admin: false }
        };

        let sessionUser = "";

        function initializeSystem() {
            const u = document.getElementById('user_id').value.toLowerCase().trim();
            const p = document.getElementById('user_pin').value.trim();
            if(core[u] && core[u].pin === p) {
                sessionUser = u;
                document.getElementById('login-overlay').style.transform = 'translateY(-100%)';
                document.getElementById('main-ui').style.display = 'flex';
                updateUI();
            } else { alert("CRITICAL ERROR: IDENTITY NOT RECOGNIZED"); }
        }

        function updateUI() {
            const user = core[sessionUser];
            document.getElementById('bal_display').innerText = user.bal.toLocaleString();
            document.getElementById('op_name').innerText = sessionUser.toUpperCase();
            document.getElementById('op_rank').innerText = user.rank;
            
            if(user.admin) {
                document.getElementById('admin_zone').style.display = 'block';
                let h = "";
                for(let key in core) {
                    h += `<tr><td>${key}</td><td style="color:var(--gold)">${core[key].bal}</td><td>${core[key].rank}</td></tr>`;
                }
                document.getElementById('db_rows').innerHTML = h;
            }
            localStorage.setItem('nebula_db', JSON.stringify(core));
        }

        function toggleGhostMode() {
            document.getElementById('bal_display').classList.toggle('blur-mode');
        }

        function sendEnergy() {
            const to = document.getElementById('t_to').value;
            const amt = document.getElementById('t_amt').value;
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent(`⚡ NEBULA TRANSFER\nSENDER: ${sessionUser}\nTARGET: ${to}\nAMOUNT: ${amt}`)}`);
        }
    </script>
</body>
</html>
