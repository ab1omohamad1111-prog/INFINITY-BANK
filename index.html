<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY SYSTEM | V4</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        /* التنسيق الجمالي الشامل - Cyberpunk Mode */
        :root {
            --primary: #00f2ff; /* اللون الأزرق السماوي المتوهج */
            --primary-glow: rgba(0, 242, 255, 0.4);
            --bg-dark: #020508;
            --card-bg: rgba(10, 15, 20, 0.9);
            --border-col: rgba(0, 242, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: 0.3s ease; /* تأثيرات انتقالية ناعمة لجميع العناصر */
        }

        body {
            background: var(--bg-dark);
            color: #ffffff;
            font-family: 'Cairo', sans-serif; /* الخط العربي الافتراضي */
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle, #001f21 0%, #020508 100%); /* خلفية متدرجة فخمة */
        }

        /* تنسيق عام للعناوين بالخيال العلمي */
        h1, .inf-label, .out_bal {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        /* صفحة الدخول */
        .page-entry {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* صندوق الدخول المطور - تأثير زجاجي شفاف (Glassmorphism) */
        .entry-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 50px 30px;
            border-radius: 35px; /* حواف منحنية كبيرة وأنيقة */
            border: 1px solid var(--border-col);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.7), inset 0 0 15px rgba(0, 242, 255, 0.05);
        }

        .title-glow {
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary); /* تأثير توهج قوي للعنوان */
            font-size: 3rem;
            margin-bottom: 5px;
        }
