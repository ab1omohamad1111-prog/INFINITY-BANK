<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY | PHANTOM OS V20</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff; --gold: #d4af37; --dark: #02050a;
            --accent: #ff007b; --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; cursor: crosshair; }
        
        body {
            background: var(--dark); color: white; min-height: 100vh; overflow-x: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* تأثير الخلفية المتحركة */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; filter: blur(2px); }

        /* شاشة الدخول الخيالية */
        #login-screen {
            background: rgba(0, 0, 0, 0.8); padding: 50px; border-radius: 40px;
            border: 2px solid var(--neon); box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            text-align: center; backdrop-filter: blur(20px); width: 100%; max-width: 450px;
            animation: glow-border 3s infinite alternate;
        }

        @keyframes glow-border { from { border-color: var(--neon); } to { border-color: var(--accent); } }

        .input-glow {
            width: 100%; padding: 15px; margin: 15px 0; background: rgba(255,255,255,0.05);
            border: 1px solid #333; border-radius: 15px; color: white; text-align: center;
            font-size: 1.1rem; outline: none; transition: 0.5s;
        }
        .input-glow:focus { border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }

        .btn-phantom {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--neon), var(--accent));
            color: white; font-weight: 900; font-family: 'Orbitron'; letter-spacing: 2px;
            cursor: pointer; position: relative; overflow: hidden;
        }

        /* واجهة المستخدم الرئيسية */
        #main-app { display: none; width: 95%; max-width: 1200px; padding: 20px; }

        .dashboard {
            display: grid; grid-template-columns: 400px 1fr; gap: 30px;
        }

        @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }

        /* البطاقة الأسطورية */
        .phantom-card {
            background: linear-gradient(135deg, #111 0%, #000 100%);
            padding: 30px; border-radius: 30px; border: 1px solid var(--gold);
            position: relative; overflow: hidden; transform-style: preserve-3d;
            transition: 0.3s; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .phantom-card:hover { transform: perspective(1000px) rotateY(10deg) rotateX(5deg); }

        .balance-display {
            font-family: 'Orbitron'; font-size: 3.5rem; color: var(--neon);
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); margin: 20px 0;
        }

        .admin-panel {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--gold);
            border-radius: 30px; padding: 30px; margin-top: 20px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { color: var(--gold); padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        td { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="login-screen">
        <h1 style="font-family:'Orbitron'; font-size: 3rem; margin-bottom: 10px; background: linear-gradient(var(--neon), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">INF V20</h1>
        <p style="letter-spacing: 5px; font-size: 0.7rem; opacity: 0.5; margin-bottom: 30px;">PHANTOM CORE SYSTEM</p>
        
        <input type="text" id="u_id" class="input-glow" placeholder="IDENTITY">
        <input type="password" id="u_pin" class="input-glow" placeholder="ACCESS KEY">
        
        <button class="btn-phantom" onclick="login()">INITIALIZE SYSTEM</button>
    </div>

    <div id="main-app">
        <div class="dashboard">
            <div class="side-panel">
                <div class="phantom-card">
                    <div style="width: 50px; height: 35px; background: var(--gold); border-radius: 5px; margin-bottom: 30px; box-shadow: 0 0 15px var(--gold);"></div>
                    <h2 id="disp_user" style="font-family:'Orbitron'; letter-spacing: 3px;">---</h2>
                    <p id="disp_rank" style="color: var(--accent); font-weight: 900;">LEVEL: ---</p>
                    <div class="balance-display" id="disp_bal">0</div>
                    <p style="font-size: 0.7rem; opacity: 0.4;">INF CURRENCY | SECURE WALLET</p>
                </div>

                <div class="admin-panel" style="background: var(--glass);">
                    <h4>نظام التحويل السريع</h4>
                    <input type="text" id="to_user" class="input-glow" placeholder="المستلم">
                    <input type="number" id="to_amt" class="input-glow" placeholder="المبلغ">
                    <button class="btn-phantom" onclick="sendRequest()">طلب تحويل 🚀</button>
                </div>
            </div>

            <div class="main-view">
                <div class="admin-panel" id="admin-view" style="display:none;">
                    <h3 style="color:var(--gold); font-family:'Orbitron';">COMMAND CENTER (ADMIN)</h3>
                    <table>
                        <thead>
                            <tr><th>العضو</th><th>الرصيد</th><th>الرتبة</th><th>إجراء</th></tr>
                        </thead>
                        <tbody id="admin_list"></tbody>
                    </table>
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <input type="text" id="m_u" class="input-glow" placeholder="اسم العضو">
                        <input type="number" id="m_a" class="input-glow" placeholder="المبلغ (+/-)">
                        <button class="btn-phantom" onclick="adminMod()" style="width:200px">تحديث</button>
                    </div>
                </div>

                <div class="admin-panel">
                    <h3>مركز شراء الخدمات 🛒</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px;">
                        <button class="btn-phantom" style="background:var(--glass); border:1px solid #333;" onclick="shop('رتبة فارس')">فارس (9,500)</button>
                        <button class="btn-phantom" style="background:var(--glass); border:1px solid #333;" onclick="shop('إعفاء عقوبة')">إعفاء (15,000)</button>
                        <button class="btn-phantom" style="background:var(--glass); border:1px solid #333;" onclick="shop('لقب ملكي')">لقب ملكي (50,000)</button>
                        <button class="btn-phantom" style="background:var(--glass); border:1px solid #333;" onclick="shop('فك حظر')">فك حظر (250,000)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // قاعدة البيانات الأسطورية
        let db = JSON.parse(localStorage.getItem('inf_v20_db')) || {
            "levi": { pin: "1001", bal: 5000000, rank: "الإمبراطور", admin: true },
            "dororo": { pin: "300", bal: 100000, rank: "نائب الامبراطور", admin: false },
            "fang": { pin: "8046", bal: 8500, rank: "المستشار", admin: false }
        };

        let currentU = "";

        // محرك الجزيئات في الخلفية
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() { this.x += this.speedX; this.y += this.speedY; }
            draw() { ctx.fillStyle = '#00f2ff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // نظام الدخول
        function login() {
            let u = document.getElementById('u_id').value.toLowerCase().trim();
            let p = document.getElementById('u_pin').value.trim();
            if(db[u] && db[u].pin === p) {
                currentU = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                updateUI();
            } else { alert("ACCESS DENIED: DNA MISMATCH"); }
        }

        function updateUI() {
            document.getElementById('disp_user').innerText = currentU.toUpperCase();
            document.getElementById('disp_rank').innerText = "LEVEL: " + db[currentU].rank;
            document.getElementById('disp_bal').innerText = db[currentU].bal.toLocaleString();
            if(db[currentU].admin) {
                document.getElementById('admin-view').style.display = 'block';
                refreshAdmin();
            }
            localStorage.setItem('inf_v20_db', JSON.stringify(db));
        }

        function refreshAdmin() {
            let h = "";
            for(let u in db) {
                h += `<tr><td>${u}</td><td style="color:var(--neon)">${db[u].bal.toLocaleString()}</td><td>${db[u].rank}</td><td><button onclick="del('${u}')" style="color:red; background:none; border:none;">X</button></td></tr>`;
            }
            document.getElementById('admin_list').innerHTML = h;
        }

        function adminMod() {
            let u = document.getElementById('m_u').value.toLowerCase();
            let v = parseInt(document.getElementById('m_a').value);
            if(db[u]) { db[u].bal += v; updateUI(); alert("DATABASE UPDATED"); }
        }

        function sendRequest() {
            let t = document.getElementById('to_user').value;
            let a = document.getElementById('to_amt').value;
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent("⚠️ طلب تحويل طارئ\nمن: " + currentU + "\nإلى: " + t + "\nالمبلغ: " + a)}`);
        }

        function shop(item) {
            window.open(`https://wa.me/212622201526?text=${encodeURIComponent("🛒 طلب شراء من المتجر الإمبراطوري\nالعضو: " + currentU + "\nالمنتج: " + item)}`);
        }

        function del(u) { if(confirm("حذف العضو؟")) { delete db[u]; updateUI(); } }
    </script>
</body>
</html>
